name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  m0:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy
      - run: make check
